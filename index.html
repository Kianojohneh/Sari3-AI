<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sari3-AI | الجزائر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --lime: #ccff00; --dark: #050505; }
        body { background-color: var(--dark); color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glow-btn { background: var(--lime); color: black; font-weight: 800; transition: 0.3s; display: block; width: 100%; border-radius: 20px; text-align: center; }
        .glow-btn:hover { shadow: 0 0 30px rgba(204, 255, 0, 0.4); transform: scale(1.02); }
        .input-style { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 15px; width: 100%; outline: none; color: white; }
        .input-style:focus { border-color: var(--lime); }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-[100] p-4 glass flex justify-between items-center px-6">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-[#ccff00] rounded-lg flex items-center justify-center shadow-lg">
                <span class="tech-font text-black font-bold text-sm">S3</span>
            </div>
            <span class="tech-font text-xl font-bold tracking-tighter">SARI3-<span class="text-[#ccff00]">AI</span></span>
        </div>
        <div class="flex gap-2">
            <button onclick="changeL('ar')" class="text-[10px] bg-white/10 px-3 py-1 rounded-full text-[#ccff00]">عربي</button>
            <button onclick="changeL('fr')" class="text-[10px] bg-white/5 px-3 py-1 rounded-full text-gray-400">FR</button>
        </div>
    </nav>

    <section class="min-h-screen flex flex-col items-center justify-center text-center px-6 pt-20">
        <h1 id="h-title" class="text-5xl font-black mb-4 leading-tight">أتمتة ذكية..<br><span class="text-[#ccff00] italic">سرعة قياسية</span></h1>
        <p id="h-desc" class="text-gray-400 text-sm max-w-xs mx-auto mb-8">Sari3-AI: الحل الجزائري الأول لإدارة المواعيد والتسجيل الفوري.</p>
        <a href="#booking" class="glow-btn py-4 max-w-xs mx-auto">ابدأ الآن</a>
    </section>

    <section id="booking" class="py-20 px-6">
        <div class="max-w-md mx-auto glass p-8 rounded-[40px] border-t-4 border-[#ccff00]">
            <h2 id="f-title" class="text-3xl font-black mb-8 text-center italic">انضم إلى <span class="text-[#ccff00]">النخبة</span></h2>
            
            <div class="space-y-4">
                <input type="text" id="c-name" class="input-style" placeholder="الاسم الكامل / المؤسسة">
                <input type="tel" id="c-phone" class="input-style" placeholder="رقم الهاتف (واتساب)">
                <select id="c-service" class="input-style text-gray-400">
                    <option value="اشتراك مؤسسة">اشتراك مؤسسة (AI + Turbo)</option>
                    <option value="On-Demand">خدمة التسجيل الفوري (On-Demand)</option>
                </select>
                <button onclick="sendToWhatsapp()" class="glow-btn py-5 text-lg mt-4 shadow-xl">إرسال الطلب عبر واتساب</button>
            </div>
            
            <div onclick="admin()" class="mt-8 flex justify-center items-center gap-2 text-[10px] text-gray-600 cursor-pointer">
                <div class="w-2 h-2 bg-[#ccff00] rounded-full animate-pulse"></div>
                <span>SARI3-AI SERVER ACTIVE</span>
            </div>
        </div>
    </section>

    <script>
        // وظيفة الإرسال للواتساب - بسيطة ومباشرة
        function sendToWhatsapp() {
            const name = document.getElementById('c-name').value;
            const phone = document.getElementById('c-phone').value;
            const service = document.getElementById('c-service').value;
            const myNum = "213791809715";

            if(name === "" || phone === "") {
                alert("الرجاء ملء الاسم والهاتف أولاً!");
                return;
            }

            const msg = `طلب جديد من الموقع:%0A👤 الاسم: ${name}%0A📞 الهاتف: ${phone}%0A🛠 الخدمة: ${service}`;
            const url = `https://wa.me/${myNum}?text=${msg}`;
            
            // فتح الرابط
            window.location.href = url;
        }

        // وظيفة اللغات
        function changeL(l) {
            const t = document.getElementById('h-title');
            const d = document.getElementById('h-desc');
            const f = document.getElementById('f-title');
            if(l === 'fr') {
                document.body.dir = 'ltr';
                t.innerHTML = "Automation Smart..<br><span class='text-[#ccff00] italic'>Vitesse Record</span>";
                d.innerText = "La solution Algérienne pour l'inscription instantanée.";
                f.innerHTML = "Rejoignez <span class='text-[#ccff00]'>l'élite</span>";
            } else {
                document.body.dir = 'rtl';
                t.innerHTML = "أتمتة ذكية..<br><span class='text-[#ccff00] italic'>سرعة قياسية</span>";
                d.innerText = "Sari3-AI: الحل الجزائري الأول لإدارة المواعيد.";
                f.innerHTML = "انضم إلى <span class='text-[#ccff00]'>النخبة</span>";
            }
        }

        // لوحة التحكم
        function admin() {
            const p = prompt("كلمة السر:");
            if(p === "1234") alert("أهلاً بك يا مدير! هذه اللوحة قيد التطوير حالياً.");
        }
    </script>
</body>
</html>
