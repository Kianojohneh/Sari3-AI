<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sari3-AI | Mobile App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Cairo', sans-serif; transition: all 0.3s ease; }
        .app-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); border-radius: 35px; }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 18px; border-radius: 20px; width: 100%; outline: none; color: #ccff00; font-weight: bold; text-align: inherit; }
        .btn-primary { background: #ccff00; color: black; font-weight: 900; box-shadow: 0 10px 30px rgba(204, 255, 0, 0.2); }
        .lang-btn { border: 1px solid #ccff00; color: #ccff00; padding: 5px 15px; border-radius: 10px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body class="flex flex-col items-center p-6 pt-8">

    <div class="w-full max-w-sm flex justify-between items-center mb-8">
        <button onclick="toggleLang()" id="langSwitcher" class="lang-btn">Français</button>
        <div class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">v3.0 Stable</div>
    </div>

    <div class="mb-8 text-center">
        <div class="inline-block p-4 bg-[#ccff00] rounded-2xl shadow-[0_0_20px_#ccff00] mb-4">
            <span class="text-black text-3xl font-black italic">S3</span>
        </div>
        <h1 id="appTitle" class="text-2xl font-black tracking-tighter uppercase italic">Sari3-AI <span class="text-[#ccff00]">Mobile</span></h1>
    </div>

    <div id="app-container" class="app-card p-8 w-full max-w-sm space-y-6">
        <div class="text-center">
            <h2 id="subtitle" class="text-lg font-bold">برمج محركك ⚡</h2>
            <p id="desc" class="text-[10px] text-gray-500">أدخل البيانات التي سيقوم التطبيق بحقنها تلقائياً</p>
        </div>

        <div class="space-y-4">
            <input type="text" id="user-name" class="input-field" placeholder="الاسم الكامل">
            <input type="tel" id="user-phone" class="input-field" placeholder="رقم الهاتف">
            <button id="mainBtn" onclick="saveData()" class="w-full btn-primary py-5 rounded-2xl text-lg active:scale-95 transition-all">تفعيل المحرك الذكي</button>
        </div>
    </div>

    <script>
        let currentLang = 'ar';

        const translations = {
            ar: {
                title: 'Sari3-AI <span class="text-[#ccff00]">Mobile</span>',
                subtitle: 'برمج محركك ⚡',
                desc: 'أدخل البيانات التي سيقوم التطبيق بحقنها تلقائياً',
                namePlh: 'الاسم الكامل',
                phonePlh: 'رقم الهاتف',
                btn: 'تفعيل المحرك الذكي',
                langBtn: 'Français',
                success: 'تم تفعيل المحرك!',
                successDesc: 'الآن عند فتح موقع التسجيل، سيعمل التطبيق تلقائياً.',
                error: 'أدخل بياناتك أولاً!'
            },
            fr: {
                title: 'Sari3-AI <span class="text-[#ccff00]">Expert</span>',
                subtitle: 'Programmez votre moteur ⚡',
                desc: 'Entrez les données que l\'application injectera automatiquement',
                namePlh: 'Nom complet',
                phonePlh: 'Numéro de téléphone',
                btn: 'Activer le moteur AI',
                langBtn: 'العربية',
                success: 'Moteur Activé !',
                successDesc: 'Maintenant, l\'application remplira les formulaires automatiquement.',
                error: 'Veuillez remplir les champs !'
            }
        };

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'fr' : 'ar';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;
            
            const t = translations[currentLang];
            document.getElementById('appTitle').innerHTML = t.title;
            document.getElementById('subtitle').innerText = t.subtitle;
            document.getElementById('desc').innerText = t.desc;
            document.getElementById('user-name').placeholder = t.namePlh;
            document.getElementById('user-phone').placeholder = t.phonePlh;
            document.getElementById('mainBtn').innerText = t.btn;
            document.getElementById('langSwitcher').innerText = t.langBtn;
        }

        function saveData() {
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('user-phone').value;
            const t = translations[currentLang];

            if(!name || !phone) { alert(t.error); return; }

            localStorage.setItem('s3_name', name);
            localStorage.setItem('s3_phone', phone);

            document.getElementById('app-container').innerHTML = `
                <div class="text-center space-y-6 py-6 animate-pulse">
                    <div class="text-5xl text-[#ccff00]">⚡</div>
                    <h2 class="text-[#ccff00] font-black text-xl">${t.success}</h2>
                    <p class="text-gray-400 text-xs px-4 leading-relaxed">${t.successDesc}</p>
                    <button onclick="window.location.reload()" class="text-gray-600 text-[10px] underline uppercase tracking-widest">Reset Data</button>
                </div>
            `;
        }
    </script>
</body>
</html>
