<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sari3-AI | محرك الأتمتة الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --lime: #ccff00; --dark: #050505; }
        body { background-color: var(--dark); color: white; font-family: 'Cairo', sans-serif; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glow-btn { background: var(--lime); color: black; font-weight: 900; transition: 0.3s; box-shadow: 0 0 25px rgba(204, 255, 0, 0.3); border-radius: 40px; text-align: center; cursor: pointer; }
        .glow-btn:hover { transform: scale(1.03); box-shadow: 0 0 45px rgba(204, 255, 0, 0.5); }
        .input-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 25px; width: 100%; outline: none; color: white; }
        .magic-button { background: white; color: black; padding: 15px; border-radius: 15px; font-weight: bold; border: 3px dashed var(--lime); display: inline-block; cursor: move; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-[100] p-5 glass flex justify-between items-center px-8">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-[#ccff00] rounded-xl flex items-center justify-center font-bold text-black tech-font text-xl">S3</div>
            <span class="tech-font text-xl tracking-tighter uppercase">SARI3-AI</span>
        </div>
        <div id="counter" class="bg-white/10 px-4 py-2 rounded-full text-xs text-[#ccff00] tech-font border border-[#ccff00]/20 font-bold text-center">
            المحاولات المجانية: 5/5
        </div>
    </nav>

    <section class="min-h-screen flex flex-col items-center justify-center text-center px-6 pt-24">
        <div id="main-content" class="max-w-md w-full space-y-8">
            <h1 class="text-5xl font-black tracking-tighter">أتمتة ذكية.. <br><span class="text-[#ccff00] italic">سرعة قياسية</span></h1>
            
            <div id="form-container" class="glass p-8 rounded-[40px] space-y-4">
                <p class="text-sm text-gray-400 mb-4">أدخل بياناتك لبرمجة محرك Sari3-AI الخاص بك</p>
                <input type="text" id="user-name" class="input-box" placeholder="الاسم الكامل">
                <input type="tel" id="user-phone" class="input-box" placeholder="رقم الهاتف">
                <button onclick="activateEngine()" id="action-btn" class="w-full glow-btn py-6 text-xl">تفعيل محرك الأتمتة ⚡</button>
            </div>
            
            <p class="text-[10px] text-gray-500 italic uppercase tracking-widest">Powered by S3 Turbo Agent Engine</p>
        </div>
    </section>

    <script>
        let attempts = localStorage.getItem('sari3_v3_count') || 0;
        updateCounter();

        function updateCounter() {
            const rem = 5 - attempts;
            document.getElementById('counter').innerText = `المحاولات المجانية: ${rem > 0 ? rem : 0}/5`;
            if (attempts >= 5) {
                const btn = document.getElementById('action-btn');
                btn.innerText = "ترقية للبريميوم (ملء غير محدود) 💎";
                btn.style.background = "linear-gradient(90deg, #ffd700, #ffa500)";
            }
        }

        function activateEngine() {
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('user-phone').value;

            if (!name || !phone) { alert("يرجى إدخال البيانات"); return; }

            if (attempts >= 5) {
                window.location.href = "https://wa.me/213791809715?text=انتهت_محاولاتي_أريد_باقة_البريميوم";
                return;
            }

            // زيادة العداد
            attempts++;
            localStorage.setItem('sari3_v3_count', attempts);
            updateCounter();

            // كود الـ Bookmarklet السحري (الميزة الحقيقية)
            const magicCode = `javascript:(function(){
                const n='${name}'; const p='${phone}';
                const inputs=document.querySelectorAll('input');
                inputs.forEach(i=>{
                    const attr=(i.name+i.placeholder+i.id).toLowerCase();
                    if(attr.includes('name')||attr.includes('اسم')) i.value=n;
                    if(attr.includes('phone')||attr.includes('هاتف')||attr.includes('tel')) i.value=p;
                    i.style.border='2px solid #ccff00';
                });
                alert('Sari3-AI: تم ملء بياناتك بنجاح! ⚡');
            })();`;

            // تغيير الواجهة لإظهار الزر السحري
            document.getElementById('form-container').innerHTML = `
                <div class="space-y-6 animate-in fade-in duration-700">
                    <div class="w-16 h-16 bg-[#ccff00] rounded-full flex items-center justify-center mx-auto shadow-[0_0_20px_#ccff00]">
                        <svg class="w-8 h-8 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <h2 class="text-xl font-bold text-[#ccff00]">المحرك جاهز (محاولة ${attempts}/5)</h2>
                    <p class="text-xs text-gray-400">اسحب الزر الأبيض أدناه وضعه في شريط العلامات (Bookmarks) في متصفحك:</p>
                    
                    <a href="${magicCode}" class="magic-button w-full text-center">SARI3-AI AUTOFILL ⚡</a>
                    
                    <div class="p-4 bg-white/5 rounded-2xl text-[10px] text-right text-gray-400">
                        <p>💡 <b>كيف تستخدمه؟</b></p>
                        <p>1. اسحب الزر للأعلى.</p>
                        <p>2. اذهب لموقع التسجيل.</p>
                        <p>3. اضغط على الزر في الشريط العلوي.</p>
                    </div>
                    
                    <button onclick="location.reload()" class="text-xs text-gray-500 underline">حجز موعد آخر</button>
                    <br>
                    <a href="https://wa.me/213791809715?text=أريد_ترقية_لحساب_بريميوم" class="text-sm font-bold text-[#ccff00] border-b border-[#ccff00] pb-1">ترقية للنسخة الاحترافية (ملء شامل + ضغط تلقائي) 💎</a>
                </div>
            `;
        }
    </script>
</body>
</html>
